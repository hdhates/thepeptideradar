<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<meta name="description" content="ThePeptideRadar is launching soon. The trusted directory for verified peptide suppliers worldwide."/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#4ecf7a;--bg:#0a0a0f;--text:#f0ede8;--text2:rgba(240,237,232,0.55);--text3:rgba(240,237,232,0.3);--border:rgba(255,255,255,0.08);}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1.5rem 3rem;}
.radar{position:relative;width:160px;height:160px;margin:0 auto 2.5rem;flex-shrink:0;}
.radar svg{position:absolute;top:0;left:0;}
.sweep{transform-origin:80px 80px;animation:sweep 3s linear infinite;}
@keyframes sweep{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:clamp(24px,5vw,36px);letter-spacing:-1px;margin-bottom:0.75rem;}
.logo span{color:var(--green);}
.tagline{font-size:clamp(14px,2.5vw,17px);font-weight:300;color:var(--text2);max-width:380px;line-height:1.7;margin-bottom:2.5rem;}
.badge{display:inline-block;border:0.5px solid rgba(78,207,122,0.35);color:var(--green);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 16px;border-radius:100px;margin-bottom:1.5rem;}
form{display:flex;gap:8px;max-width:360px;width:100%;}
form input{flex:1;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.14);border-radius:100px;padding:12px 20px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color 0.2s;}
form input::placeholder{color:var(--text3);}
form input:focus{border-color:rgba(78,207,122,0.5);}
form button{background:var(--green);color:#0a0a0f;border:none;padding:12px 22px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity 0.2s;}
form button:hover{opacity:0.85;}
.success{color:var(--green);font-size:14px;margin-top:0.75rem;display:none;}
.footer-note{margin-top:2.5rem;font-size:12px;color:var(--text3);}
.footer-note a{color:var(--text3);text-decoration:none;transition:color 0.2s;}
.footer-note a:hover{color:var(--green);}
@media(max-width:480px){form{flex-direction:column;}form button{width:100%;padding:14px;}}
</style>
</head>
<body>

<div class="radar">
  <svg width="160" height="160" viewBox="0 0 160 160" fill="none">
    <circle cx="80" cy="80" r="72" stroke="#4ecf7a" stroke-width="1" opacity="0.12"/>
    <circle cx="80" cy="80" r="50" stroke="#4ecf7a" stroke-width="1" opacity="0.18"/>
    <circle cx="80" cy="80" r="28" stroke="#4ecf7a" stroke-width="1.5" opacity="0.28"/>
    <circle cx="80" cy="80" r="6" fill="#4ecf7a"/>
  </svg>
  <svg class="sweep" width="160" height="160" viewBox="0 0 160 160" fill="none">
    <path d="M80 80 L152 8 A72 72 0 0 0 80 8 Z" fill="#4ecf7a" opacity="0.07"/>
    <line x1="80" y1="80" x2="152" y2="8" stroke="#4ecf7a" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </svg>
</div>

<div class="badge">Launching soon</div>
<div class="logo">The Peptide<span>Radar</span></div>
<p class="tagline">The independent directory for verified peptide suppliers — filtered by country, built by the community.</p>

<form id="waitlist-form">
  <input type="hidden" name="subject" value="Coming soon waitlist"/>
  <input type="email" name="email" placeholder="your@email.com" required/>
  <button type="submit">Notify me</button>
</form>
<div class="success" id="success">You're on the list ✓</div>

<div class="footer-note">
  <a href="https://twitter.com/ThePeptideRadar" target="_blank" rel="noopener">@ThePeptideRadar</a> &nbsp;·&nbsp; peptideradar@gmail.com
</div>

<script>
document.getElementById('waitlist-form').addEventListener('submit',function(e){
  e.preventDefault();
  var btn=e.target.querySelector('button');
  btn.textContent='...';btn.disabled=true;
  fetch('https://formspree.io/f/xzdywbnw',{method:'POST',body:new FormData(e.target),headers:{Accept:'application/json'}})
    .then(function(r){
      if(r.ok){e.target.style.display='none';document.getElementById('success').style.display='block';}
      else{btn.textContent='Notify me';btn.disabled=false;}
    }).catch(function(){btn.textContent='Notify me';btn.disabled=false;});
});
</script>
</body>
</html>
